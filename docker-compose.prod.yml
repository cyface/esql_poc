name: esql-poc

services:
  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: ${POSTGRES_URL}?sslmode=disable
      ELECTRIC_INSECURE: "true"
    ports:
      - "3000:3000"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/v1/health"]
      interval: 3s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest
    environment:
      PGRST_DB_URI: ${POSTGRES_URL}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_ADMIN_SERVER_PORT: "3001"
    ports:
      - "4001:3000"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/3001'"]
      interval: 3s
      timeout: 5s
      retries: 10
