name: esql-poc

services:
  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: ${POSTGRES_URL}?sslmode=disable
      ELECTRIC_INSECURE: "true"
    ports:
      - "3000:3000"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgrest:
    image: postgrest/postgrest
    environment:
      PGRST_DB_URI: ${POSTGRES_URL}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_ADMIN_SERVER_PORT: "3001"
    ports:
      - "4001:3000"
    restart: on-failure
